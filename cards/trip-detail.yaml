# Trip detail (BYD app, pantalla 7) — single-trip drilldown.
#
# Shows KPIs for the last completed trip, a comparison vs the driver's
# 30-day average consumption, a percentile (where this trip ranks among
# the recent_trips window), the estimated cost, and a route map fed from
# the vehicle's device_tracker breadcrumbs.
#
# HACS dependencies (install via HACS → Frontend):
#   - custom:mushroom-template-card
#   - custom:mushroom-title-card
#   - custom:button-card
#   - custom:ev-trip-journey-card  (ships with this integration — useful
#     if you want to switch this card to the live current trip)
#
# Placeholders:
#   __DEVICE__  → ev_trip_logger device slug (e.g. byd_sealion_7)
#   __VEHICLE__ → manufacturer integration slug used for device_tracker
#                 (e.g. byd for `device_tracker.byd_location`)

type: vertical-stack
cards:
  - type: custom:mushroom-title-card
    title: Detalle del viaje
    subtitle: >-
      {% set trips = state_attr('sensor.__DEVICE___recent_trips', 'trips') or [] %}
      {% set t = trips[0] if trips else None %}
      {% set s = t.started_at if t else None %}
      {% set e = t.ended_at if t else None %}
      {% if s and e %}
        {% set s_ts = s | as_timestamp(0) %}
        {% set e_ts = e | as_timestamp(0) %}
        {% set same_day = s_ts | timestamp_custom('%Y-%m-%d', true) ==
                          e_ts | timestamp_custom('%Y-%m-%d', true) %}
        {% set mins = ((e_ts - s_ts) / 60) | round(0) | int %}
        {% set dur = (mins ~ ' min') if mins < 90 else (
          ((mins // 60) ~ 'h ' ~ ('%02d'|format(mins % 60)) ~ 'min')) %}
        {{ s_ts | timestamp_custom('%d %b %H:%M', true) }}
        →
        {{ e_ts | timestamp_custom('%H:%M' if same_day else '%d %b %H:%M', true) }}
        · {{ dur }}
      {% elif s %}
        {{ s | as_timestamp(0) | timestamp_custom('%d %b %H:%M', true) }}
      {% else %}
        —
      {% endif %}
    icon: mdi:magnify

  # ── KPI grid (2×2) ────────────────────────────────────────────────
  - type: grid
    columns: 2
    square: false
    cards:
      - type: custom:button-card
        entity: sensor.__DEVICE___last_trip_distance
        name: Distancia
        show_state: true
        show_icon: true
        icon: mdi:road-variant
        styles:
          card:
            - padding: 12px
            - border-radius: 16px
          name:
            - font-size: 12px
            - opacity: "0.7"
          state:
            - font-size: 22px
            - font-weight: bold

      - type: custom:button-card
        entity: sensor.__DEVICE___last_trip_energy
        name: Consumo
        show_state: true
        show_icon: true
        icon: mdi:lightning-bolt
        styles:
          card:
            - padding: 12px
            - border-radius: 16px
          name:
            - font-size: 12px
            - opacity: "0.7"
          state:
            - font-size: 22px
            - font-weight: bold

      - type: custom:button-card
        entity: sensor.__DEVICE___last_trip_consumption
        name: Eficiencia
        show_state: true
        show_icon: true
        icon: mdi:speedometer
        styles:
          card:
            - padding: 12px
            - border-radius: 16px
          name:
            - font-size: 12px
            - opacity: "0.7"
          state:
            - font-size: 22px
            - font-weight: bold

      - type: custom:button-card
        # avg_speed lives on the `last_trip` sensor attributes, not as its
        # own entity — surface it via a template button.
        template: ""
        name: Velocidad media
        show_state: true
        show_icon: true
        icon: mdi:gauge
        label: >-
          [[[
            const v = states['sensor.__DEVICE___last_trip'].attributes.avg_speed_kmh;
            return (v == null) ? '—' : v.toFixed(1) + ' km/h';
          ]]]
        show_label: true
        styles:
          card:
            - padding: 12px
            - border-radius: 16px
          name:
            - font-size: 12px
            - opacity: "0.7"
          label:
            - font-size: 22px
            - font-weight: bold
          state:
            - display: none

  # ── Comparison vs personal 30-day average ─────────────────────────
  - type: custom:mushroom-template-card
    primary: Frente a tu media
    secondary: >-
      {% set trip = states('sensor.__DEVICE___last_trip_consumption') | float(0) %}
      {% set avg  = states('sensor.__DEVICE___total_30d_avg_consumption') | float(0) %}
      {% if avg > 0 and trip > 0 %}
        {% set delta = ((trip - avg) / avg) * 100 %}
        {% if delta < 0 %}
          {{ delta | round(1) }}% mejor que tu media (≈ {{ avg | round(1) }} kWh/100km)
        {% else %}
          +{{ delta | round(1) }}% peor que tu media (≈ {{ avg | round(1) }} kWh/100km)
        {% endif %}
      {% else %}
        Aún no hay datos suficientes
      {% endif %}
    icon: mdi:chart-line-variant
    icon_color: >-
      {% set trip = states('sensor.__DEVICE___last_trip_consumption') | float(0) %}
      {% set avg  = states('sensor.__DEVICE___total_30d_avg_consumption') | float(0) %}
      {% if avg > 0 and trip > 0 %}
        {{ 'green' if trip <= avg else 'red' }}
      {% else %}
        grey
      {% endif %}

  # ── Percentile within the recent_trips window ─────────────────────
  # Lower consumption is better → "Top X%" means this trip beat X% of
  # recent trips (had lower kWh/100km than them).
  - type: custom:mushroom-template-card
    primary: Percentil
    secondary: >-
      {% set trip = states('sensor.__DEVICE___last_trip_consumption') | float(0) %}
      {% set trips = state_attr('sensor.__DEVICE___recent_trips', 'trips') or [] %}
      {% set valid = trips
           | selectattr('consumption_kwh_100km', 'defined')
           | rejectattr('consumption_kwh_100km', 'none')
           | list %}
      {% set total = valid | count %}
      {% if total > 0 and trip > 0 %}
        {% set worse = valid
             | selectattr('consumption_kwh_100km', '>', trip)
             | list | count %}
        {% set pct = ((worse / total) * 100) | round(0) %}
        Top {{ pct }}% — mejor que {{ worse }} de {{ total }} viajes recientes
      {% else %}
        Sin histórico aún
      {% endif %}
    icon: mdi:trophy-variant
    icon_color: >-
      {% set trip = states('sensor.__DEVICE___last_trip_consumption') | float(0) %}
      {% set trips = state_attr('sensor.__DEVICE___recent_trips', 'trips') or [] %}
      {% set valid = trips
           | selectattr('consumption_kwh_100km', 'defined')
           | rejectattr('consumption_kwh_100km', 'none')
           | list %}
      {% set total = valid | count %}
      {% if total > 0 and trip > 0 %}
        {% set worse = valid | selectattr('consumption_kwh_100km', '>', trip) | list | count %}
        {% set pct = (worse / total) * 100 %}
        {{ 'green' if pct >= 50 else ('amber' if pct >= 25 else 'red') }}
      {% else %}
        grey
      {% endif %}

  # ── ¿Cargó durante el trip? (chip condicional) ──────────────────
  # Only renders when the car actually recovered energy via
  # regenerative braking. Hidden when regen_kwh is 0 / null so the
  # detail view stays clean for highway trips with no recovery.
  - type: conditional
    conditions:
      - condition: template
        value_template: >-
          {% set t = state_attr('sensor.__DEVICE___recent_trips', 'trips')[0] %}
          {{ t and (t.regen_kwh | float(0)) > 0 }}
    card:
      type: custom:mushroom-template-card
      primary: >-
        {% set r = state_attr('sensor.__DEVICE___recent_trips', 'trips')[0].regen_kwh | float(0) %}
        ✅ Cargó {{ r | round(2) }} kWh durante el trip
      secondary: >-
        {% set t = state_attr('sensor.__DEVICE___recent_trips', 'trips')[0] %}
        {% set r = t.regen_kwh | float(0) %}
        {% set e = t.energy_kwh | float(0) %}
        {% set gross = e + r %}
        {% if gross > 0 %}
          Recuperación por frenada regenerativa ·
          {{ (r / gross * 100) | round(1) }}% del consumo bruto
          ({{ gross | round(2) }} kWh) volvió a la batería
        {% else %}
          Recuperación por frenada regenerativa
        {% endif %}
      icon: mdi:battery-charging
      icon_color: green
      fill_container: true
      multiline_secondary: true

  # ── Charging context (kWh added BEFORE / DURING this trip) ──────
  # When the SoC delta of a trip would be misleading because the car
  # was charged between the previous trip and this one (or — rare —
  # DURING this trip), show the kWh added so the user can interpret
  # the numbers. Hidden when no charging happened in either window.
  - type: conditional
    conditions:
      - condition: template
        value_template: >-
          {% set t = state_attr('sensor.__DEVICE___recent_trips', 'trips')[0] %}
          {{ t and ((t.kwh_charged_before or 0) > 0 or (t.kwh_charged_during or 0) > 0) }}
    card:
      type: custom:mushroom-template-card
      primary: Carga relacionada
      secondary: >-
        {% set t = state_attr('sensor.__DEVICE___recent_trips', 'trips')[0] %}
        {% set b = t.kwh_charged_before or 0 %}
        {% set d = t.kwh_charged_during or 0 %}
        {% if b > 0 and d > 0 %}
          ↩ Antes: {{ b }} kWh · 🛑 Durante: {{ d }} kWh
        {% elif b > 0 %}
          ↩ Antes: {{ b }} kWh (cargó entre el trip anterior y éste)
        {% elif d > 0 %}
          🛑 Durante: {{ d }} kWh (carga dentro de la ventana del trip)
        {% endif %}
      icon: mdi:battery-plus
      icon_color: teal
      fill_container: true
      multiline_secondary: true

  # ── Estimated cost for this trip ──────────────────────────────────
  # v0.5.76 — logger now FIFO-accounts trip cost: each kWh inherits the
  # actual price of the charge that put it into the battery. The
  # `cost_basis_per_kwh` attribute is the weighted average price the
  # trip's kWh actually saw (free + home + DCFC mix → mid-range value).
  - type: custom:button-card
    entity: sensor.__DEVICE___last_trip_cost
    name: Coste FIFO
    show_state: true
    show_icon: true
    icon: mdi:cash-multiple
    label: >-
      {% set t = state_attr('sensor.__DEVICE___recent_trips', 'trips')[0] %}
      {% set basis = t.cost_basis_per_kwh if t else None %}
      {% if basis is not none %}
        {{ '%.3f' | format(basis) }} €/kWh efectivos
      {% endif %}
    show_label: true
    styles:
      card:
        - padding: 14px
        - border-radius: 16px
      name:
        - font-size: 13px
        - opacity: "0.7"
      state:
        - font-size: 26px
        - font-weight: bold
      label:
        - font-size: 12px
        - opacity: "0.6"
        - margin-top: 4px

  # ── Origin / destination addresses + embedded OSM map ─────────────
  # Logger v0.5.12 reverse-geocodes each trip's start/end coordinates via
  # Nominatim and exposes them as `start_address` / `end_address` on the
  # last_trip recent_trips item. We show the human-readable label here
  # plus a static OSM map image (no API key needed) with green/red markers
  # at the endpoints.
  - type: custom:mushroom-template-card
    primary: >-
      🟢 {{ state_attr('sensor.__DEVICE___recent_trips', 'trips')[0].start_address
            or state_attr('sensor.__DEVICE___recent_trips', 'trips')[0].origin
            or '—' }}
    secondary: Origen
    icon: mdi:map-marker-outline
    icon_color: green
    tap_action:
      action: url
      url_path: >-
        {% set t = state_attr('sensor.__DEVICE___recent_trips', 'trips')[0] %}
        https://www.google.com/maps?q={{ t.start_lat }},{{ t.start_lon }}

  - type: custom:mushroom-template-card
    primary: >-
      🔴 {{ state_attr('sensor.__DEVICE___recent_trips', 'trips')[0].end_address
            or state_attr('sensor.__DEVICE___recent_trips', 'trips')[0].destination
            or '—' }}
    secondary: Destino
    icon: mdi:map-marker-check
    icon_color: red
    tap_action:
      action: url
      url_path: >-
        {% set t = state_attr('sensor.__DEVICE___recent_trips', 'trips')[0] %}
        https://www.google.com/maps?q={{ t.end_lat }},{{ t.end_lon }}

  # v0.5.25 — route map with NUMBERED waypoints from
  # sensor.<device>_last_trip_route.points (populated for both live and
  # synthetic trips). v0.5.26 — when __GEOAPIFY_KEY__ is set, the map
  # uses Geoapify's static-map with a road-fit polyline (mirrors the
  # BYD app's "Ruta ajustada a carretera"). Fallback to OSM markers.
  # Falls through to the previous start/end-only map for older trips.
  - type: markdown
    content: >-
      {% set pts = state_attr('sensor.__DEVICE___last_trip_route', 'points') or [] %}
      {% set t = state_attr('sensor.__DEVICE___recent_trips', 'trips')[0] %}
      {% set api_key = '__GEOAPIFY_KEY__' %}
      {% set gps_km = t.gps_distance_km if t and t.gps_distance_km is not none else None %}
      {% if pts | length >= 2 %}
      {%- set lats = pts | map(attribute='lat') | list %}
      {%- set lons = pts | map(attribute='lon') | list %}
      {%- set c_lat = (lats | sum) / (lats | length) %}
      {%- set c_lon = (lons | sum) / (lons | length) %}
      {%- if api_key != '__' ~ 'GEOAPIFY_KEY__' %}
      {%- set geom_pairs = [] %}
      {%- for p in pts %}{%- set _ = geom_pairs.append(p.lon ~ ',' ~ p.lat) %}{%- endfor %}
      {%- set route = geom_pairs | join('%7C') %}
      {%- set marker_start = pts[0].lon ~ ',' ~ pts[0].lat ~ ';type:awesome;color:green;size:medium' %}
      {%- set marker_end = pts[-1].lon ~ ',' ~ pts[-1].lat ~ ';type:awesome;color:red;size:medium' %}
      ![map](https://maps.geoapify.com/v1/staticmap?style=osm-bright&width=640&height=360&geometry=polyline:{{ route }};linecolor:%2300bfff;linewidth:5&marker=lonlat:{{ marker_start }}|lonlat:{{ marker_end }}&apiKey={{ api_key }})
      {%- else %}
      {%- set markers = [] %}
      {%- for p in pts %}
      {%-   if loop.first %}
      {%-     set _ = markers.append(p.lat ~ ',' ~ p.lon ~ ',lightgreen') %}
      {%-   elif loop.last %}
      {%-     set _ = markers.append(p.lat ~ ',' ~ p.lon ~ ',red') %}
      {%-   else %}
      {%-     set _ = markers.append(p.lat ~ ',' ~ p.lon ~ ',lightblue') %}
      {%-   endif %}
      {%- endfor %}
      ![map](https://staticmap.openstreetmap.de/staticmap.php?center={{ c_lat }},{{ c_lon }}&zoom=12&size=640x360&markers={{ markers | join('|') }})
      {%- endif %}

      **Recorrido — {{ pts | length }} puntos GPS{% if gps_km is not none %} · {{ gps_km }} km{% endif %}**

      {% for p in pts -%}
      {%- if loop.first -%}🟢{%- elif loop.last -%}🔴{%- else -%}🔵{%- endif %} **{{ p.index }}.** [{{ '%.5f, %.5f'|format(p.lat, p.lon) }}](https://www.google.com/maps?q={{ p.lat }},{{ p.lon }})
      {% endfor %}

      [🗺 Ver ruta completa en Google Maps](https://www.google.com/maps/dir/?api=1&origin={{ pts[0].lat }},{{ pts[0].lon }}&destination={{ pts[-1].lat }},{{ pts[-1].lon }}{% if pts | length > 2 %}&waypoints={{ pts[1:-1][:9] | map(attribute='lat') | list | zip(pts[1:-1][:9] | map(attribute='lon') | list) | map('join', ',') | list | join('|') }}{% endif %}&travelmode=driving)

      {% elif t and t.start_lat is not none and t.end_lat is not none %}
      {%- set s_lat = t.start_lat | float %}
      {%- set s_lon = t.start_lon | float %}
      {%- set e_lat = t.end_lat | float %}
      {%- set e_lon = t.end_lon | float %}
      {%- set c_lat = (s_lat + e_lat) / 2 %}
      {%- set c_lon = (s_lon + e_lon) / 2 %}
      ![map](https://staticmap.openstreetmap.de/staticmap.php?center={{ c_lat }},{{ c_lon }}&zoom=13&size=600x350&markers={{ s_lat }},{{ s_lon }},lightgreen|{{ e_lat }},{{ e_lon }},red)

      [🗺 Ver ruta completa en Google Maps](https://www.google.com/maps/dir/?api=1&origin={{ s_lat }},{{ s_lon }}&destination={{ e_lat }},{{ e_lon }}&travelmode=driving)
      {% else %}
      _Aún no hay coordenadas GPS para este viaje. Asegúrate de tener el `location_tracker` configurado en EV Trip Logger y conduce un trip nuevo._
      {% endif %}

  # ── Fallback breadcrumb (device_tracker history) ──────────────────
  - type: map
    title: Histórico device tracker
    default_zoom: 13
    hours_to_show: >-
      {% set d = state_attr('sensor.__DEVICE___last_trip', 'duration_min') | float(0) %}
      {{ ((d / 60) + 0.5) | round(0) if d > 0 else 1 }}
    entities:
      - entity: device_tracker.__VEHICLE___location
