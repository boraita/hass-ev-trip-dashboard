# Last N completed journeys (home-to-home outings).
# Replace __DEVICE__ with your device slug.

type: markdown
content: |
  {%- set CUR = {'EUR':'€','USD':'$','GBP':'£'} %}
  {%- set journeys = state_attr('sensor.__DEVICE___recent_journeys', 'journeys') or [] %}
  ### Recent journeys ({{ journeys | length }})
  {%- if journeys | length == 0 %}

  _No completed journeys yet._
  {%- else %}
  {%- for j in journeys %}

  **{{ as_timestamp(j.ended_at) | timestamp_custom('%d/%m %H:%M') if j.ended_at else '—' }}** — journey #{{ j.journey_id }}
  {{ j.stages | default('?', true) }} {% if j.stages == 1 %}stage{% else %}stages{% endif %} · {{ j.distance_km | default('—', true) }} km · {{ j.energy_kwh | default('—', true) }} kWh · {{ j.cost | default('—', true) }} {{ CUR.get(j.currency, j.currency or '€') }}
  {%- endfor %}
  {%- endif %}
