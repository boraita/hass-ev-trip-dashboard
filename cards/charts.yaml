# Long-term statistics graphs by month + last 24h battery curve.
# Replace __DEVICE__ with your device slug.

type: vertical-stack
cards:
  # ===== Distance per month (last 12 months) =====
  - type: statistics-graph
    title: Distance per month
    entities:
      - sensor.__DEVICE___distance_this_month
    chart_type: bar
    period: month
    stat_types:
      - max
    days_to_show: 365

  # ===== Energy consumed driving per month =====
  - type: statistics-graph
    title: Energy consumed per month
    entities:
      - sensor.__DEVICE___energy_this_month
    chart_type: bar
    period: month
    stat_types:
      - max
    days_to_show: 365

  # ===== Number of trips per month =====
  - type: statistics-graph
    title: Trips per month
    entities:
      - sensor.__DEVICE___trips_this_month
    chart_type: bar
    period: month
    stat_types:
      - max
    days_to_show: 365

  # ===== Avg consumption trend (last 30 days, rolling) =====
  - type: statistics-graph
    title: Average consumption (kWh/100km, last 30 days rolling)
    entities:
      - sensor.__DEVICE___avg_consumption_30_days
    chart_type: line
    period: day
    stat_types:
      - mean
    days_to_show: 30

  # ===== Battery level over last 24h =====
  - type: history-graph
    title: Battery level (last 24h)
    hours_to_show: 24
    entities:
      - entity: sensor.__DEVICE___battery_level
        name: SoC
      - entity: sensor.__DEVICE___battery_energy
        name: kWh in battery

  # ===== Avg charge price trend =====
  - type: statistics-graph
    title: Average charge price (€/kWh, 30 day rolling)
    entities:
      - sensor.__DEVICE___avg_charge_price_30_days
    chart_type: line
    period: day
    stat_types:
      - mean
    days_to_show: 60
