# Pantalla 8 — BYD-app Trip list (v2).
# "Viajes" header + Last-30-days KPI strip (5 tiles) + per-trip cards with
# date·time / Distance / Consumption / Efficiency / Cost / color-coded Score.
#
# Replace __DEVICE__ with your device slug (e.g. byd_sealion_7).
#
# REQUIRED HACS frontend cards:
#   - custom:mushroom-template-card
#   - custom:mushroom-title-card
#   - custom:button-card

type: vertical-stack
cards:
  # ── Header ──────────────────────────────────────────────────────────────
  - type: custom:mushroom-title-card
    title: Viajes
    subtitle: Last 30 days
    icon: mdi:car-electric

  # ── KPI strip (Last 30 days averages) ───────────────────────────────────
  # 5 button-cards laid out in a 5-column grid (wraps to 3+2 on narrow widths).
  - type: grid
    columns: 5
    square: false
    cards:
      - type: custom:button-card
        entity: sensor.__DEVICE___avg_trip_distance_30_days
        name: Avg distance
        icon: mdi:map-marker-distance
        show_state: true
        show_name: true
        show_icon: true
        styles:
          card:
            - padding: 10px
            - border-radius: 14px
          name:
            - font-size: 12px
            - opacity: "0.75"
          state:
            - font-size: 18px
            - font-weight: bold
        state_display: |
          [[[ return `${entity.state} km` ]]]

      - type: custom:button-card
        name: Avg consumption
        icon: mdi:flash
        show_state: true
        show_name: true
        show_icon: true
        styles:
          card:
            - padding: 10px
            - border-radius: 14px
          name:
            - font-size: 12px
            - opacity: "0.75"
          state:
            - font-size: 18px
            - font-weight: bold
        # Average of the last 10 trips' energy (kWh). Falls back to "—".
        state_display: |
          [[[
            const trips = (states['sensor.__DEVICE___recent_trips']
                          && states['sensor.__DEVICE___recent_trips'].attributes
                          && states['sensor.__DEVICE___recent_trips'].attributes.trips) || [];
            const vals = trips.map(t => parseFloat(t.energy_kwh)).filter(v => !isNaN(v));
            if (!vals.length) return '— kWh';
            const avg = vals.reduce((a,b)=>a+b,0) / vals.length;
            return `${avg.toFixed(2)} kWh`;
          ]]]

      - type: custom:button-card
        entity: sensor.__DEVICE___avg_consumption_30_days
        name: Avg efficiency
        icon: mdi:lightning-bolt-outline
        show_state: true
        show_name: true
        show_icon: true
        styles:
          card:
            - padding: 10px
            - border-radius: 14px
          name:
            - font-size: 12px
            - opacity: "0.75"
          state:
            - font-size: 18px
            - font-weight: bold
        state_display: |
          [[[ return `${entity.state} kWh/100km` ]]]

      - type: custom:button-card
        entity: sensor.__DEVICE___avg_trip_duration_30_days
        name: Avg duration
        icon: mdi:timer-outline
        show_state: true
        show_name: true
        show_icon: true
        styles:
          card:
            - padding: 10px
            - border-radius: 14px
          name:
            - font-size: 12px
            - opacity: "0.75"
          state:
            - font-size: 18px
            - font-weight: bold
        state_display: |
          [[[ return `${entity.state} min` ]]]

      - type: custom:button-card
        entity: sensor.__DEVICE___avg_trip_speed_30_days
        name: Avg speed
        icon: mdi:speedometer
        show_state: true
        show_name: true
        show_icon: true
        styles:
          card:
            - padding: 10px
            - border-radius: 14px
          name:
            - font-size: 12px
            - opacity: "0.75"
          state:
            - font-size: 18px
            - font-weight: bold
        state_display: |
          [[[ return `${entity.state} km/h` ]]]

  # ── Per-trip list (last 10) ─────────────────────────────────────────────
  # One mushroom-template-card renders a markdown blob with all trips so the
  # Jinja for-loop runs once. Score is color-coded with an emoji indicator.
  - type: custom:mushroom-template-card
    primary: Recent trips
    secondary: "{{ states('sensor.__DEVICE___recent_trips') }} in the log"
    icon: mdi:format-list-bulleted
    icon_color: blue
    fill_container: true
    multiline_secondary: true
    content: |
      {%- set trips = state_attr('sensor.__DEVICE___recent_trips', 'trips') or [] %}
      {#- Force newest-first ordering by started_at so the most recent trip is always on top. -#}
      {%- set trips = trips | sort(attribute='started_at', reverse=True) %}
      {%- for t in trips[:10] %}
      {#- v0.6.x logger flags low-signal trips (short distance, wide
          consumption band). Dim the whole row + add a ⚠ chip so the
          user knows a high kWh/100km point isn't a regression — it's a
          3 km city loop with HVAC dominating the integral. -#}
      {%- set low = t.low_confidence | default(false) %}
      {%- set lo = t.consumption_lower_kwh_100km %}
      {%- set hi = t.consumption_upper_kwh_100km %}
      {%- set eff_display %}
        {%- if low and lo is not none and hi is not none -%}
          {{ lo | round(0) | int }}–{{ hi | round(0) | int }} kWh/100km
        {%- else -%}
          {{ t.consumption_kwh_100km | default('—') }} kWh/100km
        {%- endif %}
      {%- endset %}
      {% if low %}<span style="opacity:0.55">{% endif %}### {{ as_timestamp(t.started_at) | timestamp_custom('%d/%m/%Y') }} · {{ as_timestamp(t.started_at) | timestamp_custom('%H:%M') }}{% if low %} <span title="Trip too short / noisy — band shown instead of biased point estimate">⚠ baja confianza</span>{% endif %}
      | Distance | Consumption | Efficiency | Cost | Score |
      |---:|---:|---:|---:|:--:|
      | {{ t.distance_km | default('—') }} km | {{ t.energy_kwh | default('—') }} kWh | {{ eff_display | trim }} | {{ t.cost | default('—') }} {{ t.currency | default('') }} | {% set s = t.score | float(0) %}{% if s >= 7 %}🟢{% elif s >= 4 %}🟡{% else %}🔴{% endif %} **{{ t.score | default('—') }}** |

      _{{ t.origin | default('—') }} → {{ t.destination | default('—') }}_
      {#- Google-Maps route link: emit ONLY when origin != destination (skip round trips).
          Prefer precise lat/lon (v0.5.3+); fall back to text search by zone name. -#}
      {%- set same_place = (t.origin or '') | string == (t.destination or '') | string %}
      {%- if not same_place %}
      {%- if t.start_lat is not none and t.end_lat is not none %}
      [🗺 Ver ruta en Google Maps](https://www.google.com/maps/dir/?api=1&origin={{ t.start_lat }},{{ t.start_lon }}&destination={{ t.end_lat }},{{ t.end_lon }}&travelmode=driving)
      {%- elif t.origin and t.destination %}
      [🗺 Ver ruta en Google Maps](https://www.google.com/maps/dir/?api=1&origin={{ t.origin | urlencode }}&destination={{ t.destination | urlencode }}&travelmode=driving)
      {%- endif %}
      {%- endif %}
      {%- if not loop.last %}

      ---
      {%- endif %}
      {% if low %}</span>{% endif %}
      {%- else %}
      _No trips recorded yet._
      {%- endfor %}
