# =============================================================================
# Tops / Rankings — Pantalla 6 of the BYD app.
# KPI tiles for the single best trip per criterion + Top-9 list cards.
#
# Source sensor: sensor.__DEVICE___tops
#   state                    -> total ranking entries
#   attributes.longest       -> [ {trip_id, started_at, ended_at, distance_km,
#                                  duration_min, energy_kwh,
#                                  consumption_kwh_100km, avg_speed_kmh,
#                                  cost, currency, origin, destination}, ... ]
#   attributes.longest_duration, top_consumption, top_efficiency, top_speed,
#   cheapest follow the same shape.
#
# Requires HACS: mushroom (template + title) and button-card.
# Replace __DEVICE__ with the ev-trip-logger device slug.
# =============================================================================

type: vertical-stack
cards:
  # ---------------------------------------------------------------------------
  # HEADER
  # ---------------------------------------------------------------------------
  - type: custom:mushroom-title-card
    title: Récords
    subtitle: >-
      {{ states('sensor.__DEVICE___tops') }} viajes clasificados
    icon: mdi:trophy

  # ---------------------------------------------------------------------------
  # KPI TILES — 2x2 grid of "best of" headline numbers.
  # Each tile reads the first element of the relevant ranking list. We guard
  # against an empty list so the card keeps rendering on a fresh install.
  # ---------------------------------------------------------------------------
  - type: grid
    columns: 2
    square: false
    cards:
      # -------- LONGEST --------------------------------------------------------
      - type: custom:button-card
        name: LONGEST
        icon: mdi:map-marker-distance
        show_state: false
        show_label: true
        label: |
          [[[
            const list = states['sensor.__DEVICE___tops']?.attributes?.longest || [];
            if (!list.length) return '—';
            const t = list[0];
            const km = t.distance_km != null ? Number(t.distance_km).toFixed(1) : '—';
            const d  = t.ended_at ? new Date(t.ended_at).toLocaleDateString('es-ES') : '';
            return `${km} km\n${d}`;
          ]]]
        styles:
          card:
            - padding: 12px
            - border-radius: 16px
          name:
            - font-size: 11px
            - letter-spacing: 1px
            - color: var(--secondary-text-color)
          label:
            - font-size: 16px
            - font-weight: 600
            - white-space: pre-line
            - line-height: 1.3
          icon:
            - color: var(--info-color)
            - width: 28px

      # -------- MAX DURATION ---------------------------------------------------
      - type: custom:button-card
        name: MAX DURATION
        icon: mdi:timer-sand
        show_state: false
        show_label: true
        label: |
          [[[
            const list = states['sensor.__DEVICE___tops']?.attributes?.longest_duration || [];
            if (!list.length) return '—';
            const t = list[0];
            const mn = t.duration_min != null ? Math.round(Number(t.duration_min)) : '—';
            const d  = t.ended_at ? new Date(t.ended_at).toLocaleDateString('es-ES') : '';
            return `${mn} min\n${d}`;
          ]]]
        styles:
          card:
            - padding: 12px
            - border-radius: 16px
          name:
            - font-size: 11px
            - letter-spacing: 1px
            - color: var(--secondary-text-color)
          label:
            - font-size: 16px
            - font-weight: 600
            - white-space: pre-line
            - line-height: 1.3
          icon:
            - color: var(--warning-color)
            - width: 28px

      # -------- CHEAPEST -------------------------------------------------------
      - type: custom:button-card
        name: CHEAPEST
        icon: mdi:cash-multiple
        show_state: false
        show_label: true
        label: |
          [[[
            const list = states['sensor.__DEVICE___tops']?.attributes?.cheapest || [];
            if (!list.length) return '—';
            const t = list[0];
            const c  = t.cost != null ? Number(t.cost).toFixed(2) : '—';
            const cur = t.currency || '€';
            const d  = t.ended_at ? new Date(t.ended_at).toLocaleDateString('es-ES') : '';
            return `${c} ${cur}\n${d}`;
          ]]]
        styles:
          card:
            - padding: 12px
            - border-radius: 16px
          name:
            - font-size: 11px
            - letter-spacing: 1px
            - color: var(--secondary-text-color)
          label:
            - font-size: 16px
            - font-weight: 600
            - white-space: pre-line
            - line-height: 1.3
          icon:
            - color: var(--success-color)
            - width: 28px

      # -------- BEST EFFICIENCY (lowest kWh/100km) ----------------------------
      - type: custom:button-card
        name: BEST EFFICIENCY
        icon: mdi:leaf
        show_state: false
        show_label: true
        label: |
          [[[
            const list = states['sensor.__DEVICE___tops']?.attributes?.top_efficiency || [];
            if (!list.length) return '—';
            const t = list[0];
            const v = t.consumption_kwh_100km != null
              ? Number(t.consumption_kwh_100km).toFixed(1) : '—';
            const d = t.ended_at ? new Date(t.ended_at).toLocaleDateString('es-ES') : '';
            return `${v} kWh/100\n${d}`;
          ]]]
        styles:
          card:
            - padding: 12px
            - border-radius: 16px
          name:
            - font-size: 11px
            - letter-spacing: 1px
            - color: var(--secondary-text-color)
          label:
            - font-size: 16px
            - font-weight: 600
            - white-space: pre-line
            - line-height: 1.3
          icon:
            - color: var(--success-color)
            - width: 28px

  # ---------------------------------------------------------------------------
  # 🥇 TOP DISTANCE — first 9 entries of `longest`
  # ---------------------------------------------------------------------------
  - type: custom:mushroom-template-card
    primary: 🥇 Top Distance
    secondary: |-
      {%- set rows = state_attr('sensor.__DEVICE___tops', 'longest') or [] %}
      {%- if rows | length == 0 %}
      _Sin datos todavía._
      {%- else %}
      {%- for t in rows[:9] %}
      {{ loop.index }}. {{ as_timestamp(t.ended_at) | timestamp_custom('%d/%m/%Y') }} · **{{ '%.1f' | format(t.distance_km | float(0)) }} km**
      {%- endfor %}
      {%- endif %}
    icon: mdi:map-marker-distance
    icon_color: blue
    fill_container: true
    multiline_secondary: true

  # ---------------------------------------------------------------------------
  # ⚡ TOP CONSUMPTION — most energy used per trip
  # ---------------------------------------------------------------------------
  - type: custom:mushroom-template-card
    primary: ⚡ Top Consumption
    secondary: |-
      {%- set rows = state_attr('sensor.__DEVICE___tops', 'top_consumption') or [] %}
      {%- if rows | length == 0 %}
      _Sin datos todavía._
      {%- else %}
      {%- for t in rows[:9] %}
      {{ loop.index }}. {{ as_timestamp(t.ended_at) | timestamp_custom('%d/%m/%Y') }} · **{{ '%.2f' | format(t.energy_kwh | float(0)) }} kWh**
      {%- endfor %}
      {%- endif %}
    icon: mdi:flash
    icon_color: amber
    fill_container: true
    multiline_secondary: true

  # ---------------------------------------------------------------------------
  # 🌱 TOP EFFICIENCY — lowest kWh/100 km (best first)
  # ---------------------------------------------------------------------------
  - type: custom:mushroom-template-card
    primary: 🌱 Top Efficiency
    secondary: |-
      {%- set rows = state_attr('sensor.__DEVICE___tops', 'top_efficiency') or [] %}
      {%- if rows | length == 0 %}
      _Sin datos todavía._
      {%- else %}
      {%- for t in rows[:9] %}
      {{ loop.index }}. {{ as_timestamp(t.ended_at) | timestamp_custom('%d/%m/%Y') }} · **{{ '%.1f' | format(t.consumption_kwh_100km | float(0)) }} kWh/100**
      {%- endfor %}
      {%- endif %}
    icon: mdi:leaf
    icon_color: green
    fill_container: true
    multiline_secondary: true

  # ---------------------------------------------------------------------------
  # 🚀 TOP AVERAGE SPEED
  # ---------------------------------------------------------------------------
  - type: custom:mushroom-template-card
    primary: 🚀 Top Average Speed
    secondary: |-
      {%- set rows = state_attr('sensor.__DEVICE___tops', 'top_speed') or [] %}
      {%- if rows | length == 0 %}
      _Sin datos todavía._
      {%- else %}
      {%- for t in rows[:9] %}
      {{ loop.index }}. {{ as_timestamp(t.ended_at) | timestamp_custom('%d/%m/%Y') }} · **{{ '%.0f' | format(t.avg_speed_kmh | float(0)) }} km/h**
      {%- endfor %}
      {%- endif %}
    icon: mdi:speedometer
    icon_color: red
    fill_container: true
    multiline_secondary: true
