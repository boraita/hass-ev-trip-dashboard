# EV Trip Dashboard — mobile-first compact layout.
# Same backend as full.yaml but only the 4 most-used views, single column.
#
# Placeholders:
#   __DEVICE__   the trip-LOGGER slug (e.g. sealion_7)
#   __VEHICLE__  the CAR integration slug (e.g. byd_sealion_7)
#
# Required HACS frontends (same as full.yaml — see that file for the full list).

title: EV Mobile
views:

  - title: Resumen
    path: resumen
    icon: mdi:car-electric
    type: sections
    max_columns: 1
    sections:
      - type: grid
        cards:
          !include ../cards/resumen-vehicle.yaml

  - title: Viajes
    path: trips
    icon: mdi:car-multiple
    type: sections
    max_columns: 1
    sections:
      - type: grid
        cards:
          !include ../cards/trip-list-v2.yaml

  - title: Cargas
    path: charges
    icon: mdi:ev-station
    type: sections
    max_columns: 1
    sections:
      - type: grid
        cards:
          !include ../cards/charges-v2.yaml

  - title: Récords
    path: tops
    icon: mdi:trophy
    type: sections
    max_columns: 1
    sections:
      - type: grid
        cards:
          !include ../cards/tops-rankings.yaml
