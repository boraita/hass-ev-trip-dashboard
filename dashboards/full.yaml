# Full EV Trip Dashboard — Driving (default), History, Trips, Charts, Stats.
# The Trips view needs the helpers in packages/trip-list-helpers.yaml.
# Replace __DEVICE__ with your device slug before importing.

title: EV Trip
views:

  # ===== VIEW 1: DRIVING (default) =====
  - title: Driving
    path: driving
    icon: mdi:car
    cards:

      # Battery status at the top
      - type: vertical-stack
        cards:
          - type: gauge
            entity: sensor.__DEVICE___battery_level
            name: Battery
            min: 0
            max: 100
            needle: true
            severity:
              green: 50
              yellow: 20
              red: 0
          - type: glance
            columns: 2
            entities:
              - entity: sensor.__DEVICE___battery_energy
                name: In battery
              - entity: sensor.__DEVICE___energy_to_full_charge
                name: "To 100%"

      # ===== TRIP slot: live if driving, otherwise the last completed one =====
      # When there's an active trip (distance > 0) the glance shows live data.
      - type: conditional
        conditions:
          - condition: numeric_state
            entity: sensor.__DEVICE___current_trip_distance
            above: 0
        card:
          type: vertical-stack
          cards:
            - type: markdown
              content: "### 🟢 Trip in progress"
            - type: glance
              columns: 4
              entities:
                - entity: sensor.__DEVICE___current_trip_distance
                  name: km
                - entity: sensor.__DEVICE___current_trip_duration
                  name: min
                - entity: sensor.__DEVICE___current_trip_energy
                  name: kWh
                - entity: sensor.__DEVICE___current_trip_consumption
                  name: kWh/100
                - entity: sensor.__DEVICE___current_trip_average_speed
                  name: km/h
                - entity: sensor.__DEVICE___current_trip_max_power
                  name: kW max
                - entity: sensor.__DEVICE___current_trip_battery_used
                  name: "% used"
                - entity: sensor.__DEVICE___current_trip_avg_temperature
                  name: "°C"
      # Otherwise: the last completed trip stays in the same slot.
      - type: conditional
        conditions:
          - condition: numeric_state
            entity: sensor.__DEVICE___current_trip_distance
            below: 0.001
        card:
          type: vertical-stack
          cards:
            - type: markdown
              content: |
                ### Last trip
                {%- set ended = state_attr('sensor.__DEVICE___last_trip_distance', 'ended_at') %}
                {%- if ended %}
                _{{ as_timestamp(ended) | timestamp_custom('%d/%m %H:%M') }} — {{ state_attr('sensor.__DEVICE___last_trip_distance', 'origin') or '?' }} → {{ state_attr('sensor.__DEVICE___last_trip_distance', 'destination') or '?' }}_
                {%- endif %}
            - type: glance
              columns: 3
              entities:
                - entity: sensor.__DEVICE___last_trip_distance
                  name: km
                - entity: sensor.__DEVICE___last_trip_duration
                  name: min
                - entity: sensor.__DEVICE___last_trip_energy
                  name: kWh
                - entity: sensor.__DEVICE___last_trip_consumption
                  name: kWh/100
                - entity: sensor.__DEVICE___last_trip_cost
                  name: "€"
                - entity: sensor.__DEVICE___last_trip_score
                  name: score

      # ===== JOURNEY slot: current if in flight, otherwise last completed =====
      - type: markdown
        content: |
          {%- set s = states('sensor.__DEVICE___current_journey') | int(0) %}
          {%- if s > 0 %}
          ### 🟢 Journey in progress
          - **{{ s }} {% if s == 1 %}stage{% else %}stages{% endif %}** so far
          - Distance: **{{ state_attr('sensor.__DEVICE___current_journey', 'distance_km') }} km**
          - Energy: **{{ state_attr('sensor.__DEVICE___current_journey', 'energy_kwh') }} kWh**
          - Cost: **{{ state_attr('sensor.__DEVICE___current_journey', 'cost') }} €**
          {%- if state_attr('sensor.__DEVICE___current_journey', 'stage_active') %}
          - _Stage moving right now_
          {%- endif %}
          {%- else %}
          {%- set ls = states('sensor.__DEVICE___last_journey') %}
          {%- if ls in ('unknown', 'unavailable', '0', 'None') %}
          ### Last journey
          _No completed journeys yet._
          {%- else %}
          ### Last journey
          {%- set ended = state_attr('sensor.__DEVICE___last_journey', 'ended_at') %}
          {%- if ended %}
          _Ended {{ as_timestamp(ended) | timestamp_custom('%d/%m %H:%M') }}_
          {%- endif %}
          - **{{ ls }} stages**
          - Distance: **{{ state_attr('sensor.__DEVICE___last_journey', 'distance_km') }} km**
          - Energy: **{{ state_attr('sensor.__DEVICE___last_journey', 'energy_kwh') }} kWh**
          - Cost: **{{ state_attr('sensor.__DEVICE___last_journey', 'cost') }} €**
          {%- endif %}
          {%- endif %}

  # ===== VIEW 2: HISTORY =====
  - title: History
    path: history
    icon: mdi:format-list-bulleted
    cards:
      - type: markdown
        content: |
          ### Recent trips ({{ states('sensor.__DEVICE___recent_trips') }})
          {%- for t in state_attr('sensor.__DEVICE___recent_trips', 'trips') or [] %}

          **{{ as_timestamp(t.ended_at) | timestamp_custom('%d/%m %H:%M') }}**{% if t.journey_id %} · _journey #{{ t.journey_id }}_{% endif %}
          | Distance | Energy | Efficiency | Cost | Score |
          |---:|---:|---:|---:|---:|
          | {{ t.distance_km }} km | {{ t.energy_kwh or "—" }} kWh | {{ t.consumption_kwh_100km or "—" }} kWh/100 | {{ t.cost or "—" }} {{ t.currency or "" }} | **{{ t.score or "—" }}** |
          {%- endfor %}

      - type: markdown
        content: |
          ### Recent journeys ({{ states('sensor.__DEVICE___recent_journeys') }})
          {%- for j in state_attr('sensor.__DEVICE___recent_journeys', 'journeys') or [] %}

          **{{ as_timestamp(j.ended_at) | timestamp_custom('%d/%m %H:%M') }}** — journey #{{ j.journey_id }}
          {{ j.stages }} {% if j.stages == 1 %}stage{% else %}stages{% endif %} · {{ j.distance_km }} km · {{ j.energy_kwh }} kWh · {{ j.cost }} €
          {%- endfor %}

      - type: markdown
        content: |
          ### Recent charges
          {%- for c in state_attr('sensor.__DEVICE___recent_charges', 'charges') or [] %}

          **{{ as_timestamp(c.ended_at) | timestamp_custom('%d/%m %H:%M') }}** — {{ c.location or "—" }}
          {{ c.kwh }} kWh × {{ c.price_per_kwh }} €/kWh = **{{ c.total_cost }} {{ c.currency }}**
          {%- endfor %}

  # ===== VIEW 3: TRIPS (searchable list + records) =====
  # Needs the helpers in packages/trip-list-helpers.yaml.
  - title: Trips
    path: trips
    icon: mdi:map-search
    cards:
      - type: markdown
        content: |
          {% set trips = state_attr('sensor.__DEVICE___recent_trips', 'trips') or [] %}
          {%- if trips | length == 0 %}
          ### 🏆 Trip records
          _No trips recorded yet._
          {%- else %}
          {%- set scored = trips | rejectattr('score', 'none') | list %}
          {%- set with_dist = trips | rejectattr('distance_km', 'none') | list %}
          {%- set with_eff = trips | rejectattr('consumption_kwh_100km', 'none') | list %}
          {%- set with_cost = trips | rejectattr('cost', 'none') | list %}
          {%- set best = (scored | sort(attribute='score', reverse=true) | first) if scored else none %}
          {%- set longest = (with_dist | sort(attribute='distance_km', reverse=true) | first) if with_dist else none %}
          {%- set efficient = (with_eff | sort(attribute='consumption_kwh_100km') | first) if with_eff else none %}
          {%- set cheapest = (with_cost | sort(attribute='cost') | first) if with_cost else none %}
          ### 🏆 Trip records (last {{ trips | length }} trips)
          | Record | When | Where | Value |
          |---|---|---|---:|
          {%- if best %}
          | 🥇 Best score | {{ as_timestamp(best.ended_at) | timestamp_custom('%d/%m') }} | {{ best.destination or '—' }} | **{{ best.score }}** |
          {%- endif %}
          {%- if longest %}
          | 📏 Longest | {{ as_timestamp(longest.ended_at) | timestamp_custom('%d/%m') }} | {{ longest.destination or '—' }} | **{{ longest.distance_km }} km** |
          {%- endif %}
          {%- if efficient %}
          | 🔋 Most efficient | {{ as_timestamp(efficient.ended_at) | timestamp_custom('%d/%m') }} | {{ efficient.destination or '—' }} | **{{ efficient.consumption_kwh_100km }} kWh/100** |
          {%- endif %}
          {%- if cheapest %}
          | 💶 Cheapest | {{ as_timestamp(cheapest.ended_at) | timestamp_custom('%d/%m') }} | {{ cheapest.destination or '—' }} | **{{ cheapest.cost }} {{ cheapest.currency or '€' }}** |
          {%- endif %}
          {%- endif %}

      - type: entities
        title: Search
        show_header_toggle: false
        entities:
          - entity: input_text.__DEVICE___trip_search
            name: Search (destination / date)
          - entity: input_select.__DEVICE___trip_sort
            name: Sort by

      - type: markdown
        content: |
          {% set q = states('input_text.__DEVICE___trip_search') | lower | trim %}
          {% set sort = states('input_select.__DEVICE___trip_sort') %}
          {% set trips = state_attr('sensor.__DEVICE___recent_trips', 'trips') or [] %}
          {% set ns = namespace(rows=[]) %}
          {%- for t in trips %}
            {%- set label = ((t.origin or '') ~ ' ' ~ (t.destination or '') ~ ' ' ~ (as_timestamp(t.ended_at) | timestamp_custom('%d/%m/%Y %H:%M'))) | lower %}
            {%- if q == '' or q in label %}{% set ns.rows = ns.rows + [t] %}{%- endif %}
          {%- endfor %}
          {%- if sort == 'Distance' %}{% set ns.rows = ns.rows | rejectattr('distance_km', 'none') | sort(attribute='distance_km', reverse=true) | list %}
          {%- elif sort == 'Score' %}{% set ns.rows = ns.rows | rejectattr('score', 'none') | sort(attribute='score', reverse=true) | list %}
          {%- elif sort == 'Efficiency' %}{% set ns.rows = ns.rows | rejectattr('consumption_kwh_100km', 'none') | sort(attribute='consumption_kwh_100km') | list %}
          {%- elif sort == 'Cost' %}{% set ns.rows = ns.rows | rejectattr('cost', 'none') | sort(attribute='cost', reverse=true) | list %}
          {%- else %}{% set ns.rows = ns.rows | sort(attribute='ended_at', reverse=true) | list %}
          {%- endif %}
          ### Showing {{ ns.rows | length }}{% if q %} of {{ trips | length }}{% endif %} trips
          {%- for t in ns.rows %}

          **{{ as_timestamp(t.ended_at) | timestamp_custom('%d/%m %H:%M') }}** · {{ t.origin or '—' }} → {{ t.destination or '—' }}{% if t.journey_id %} · _journey #{{ t.journey_id }}_{% endif %}
          | Dist | Energy | Effic | Cost | Dur | Score |
          |---:|---:|---:|---:|---:|---:|
          | {{ t.distance_km }} km | {{ t.energy_kwh or "—" }} kWh | {{ t.consumption_kwh_100km or "—" }} | {{ t.cost or "—" }} {{ t.currency or "" }} | {{ t.duration_min or "—" }}m | **{{ t.score or "—" }}** |
          {%- else %}

          _No trips match "{{ q }}"._
          {%- endfor %}

  # ===== VIEW 4: CHARTS =====
  - title: Charts
    path: charts
    icon: mdi:chart-line
    cards:
      - type: statistics-graph
        title: Distance per month
        entities:
          - sensor.__DEVICE___distance_this_month
        chart_type: bar
        period: month
        stat_types:
          - max
        days_to_show: 365
      - type: statistics-graph
        title: Energy consumed per month
        entities:
          - sensor.__DEVICE___energy_this_month
        chart_type: bar
        period: month
        stat_types:
          - max
        days_to_show: 365
      - type: statistics-graph
        title: Trips per month
        entities:
          - sensor.__DEVICE___trips_this_month
        chart_type: bar
        period: month
        stat_types:
          - max
        days_to_show: 365
      - type: statistics-graph
        title: Avg consumption 30d (kWh/100km)
        entities:
          - sensor.__DEVICE___avg_consumption_30_days
        chart_type: line
        period: day
        stat_types:
          - mean
        days_to_show: 60
      - type: history-graph
        title: Battery state (24h)
        hours_to_show: 24
        entities:
          - entity: sensor.__DEVICE___battery_level
            name: SoC
          - entity: sensor.__DEVICE___battery_energy
            name: kWh
      - type: logbook
        title: Recent activity (last 7d)
        hours_to_show: 168
        entities:
          - sensor.__DEVICE___last_trip_distance
          - sensor.__DEVICE___last_charge_energy

  # ===== VIEW 5: STATS =====
  - title: Stats
    path: stats
    icon: mdi:chart-bar
    cards:
      - type: entities
        title: Driving — this month
        entities:
          - sensor.__DEVICE___distance_today
          - sensor.__DEVICE___distance_this_week
          - sensor.__DEVICE___distance_this_month
          - sensor.__DEVICE___distance_this_year
          - type: divider
          - sensor.__DEVICE___energy_this_month
          - sensor.__DEVICE___cost_this_month
          - sensor.__DEVICE___trips_this_month
          - type: divider
          - sensor.__DEVICE___avg_consumption_30_days
      - type: entities
        title: Charging — this month
        entities:
          - sensor.__DEVICE___charges_this_month
          - sensor.__DEVICE___energy_charged_this_month
          - sensor.__DEVICE___spent_on_charging_this_month
          - type: divider
          - sensor.__DEVICE___avg_charge_price_30_days
          - sensor.__DEVICE___charge_in_progress
