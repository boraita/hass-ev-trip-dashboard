# Full EV Trip Dashboard (v2) — sections layout.
# Views: Driving (default), Trips, History, Charts, Stats.
#
# Two placeholders to replace before importing:
#   sim_ev   the trip-LOGGER slug (e.g. sealion_7) — trips/charges/stats sensors
#   sim_ev  the CAR integration slug (e.g. byd_sealion_7) — range/odometer/map/temps/charge-session
# If you only run the logger, sim_ev entities simply show "unavailable" — delete those cards.
#
# The Trips view search/sort/filter needs the helpers in packages/trip-list-helpers.yaml.

title: EV Trip
views:

  # ===== VIEW 1: DRIVING (default) =====
  - title: Driving
    path: driving
    icon: mdi:car
    type: sections
    max_columns: 2
    sections:
      - type: grid
        cards:
          - type: heading
            heading: Status
            icon: mdi:car-electric
          - type: gauge
            entity: sensor.sim_ev_battery_percent
            name: Battery
            min: 0
            max: 100
            needle: true
            severity:
              green: 50
              yellow: 20
              red: 0
          - type: glance
            columns: 2
            entities:
              - entity: sensor.sim_ev_battery_energy
                name: In battery
              - entity: sensor.sim_ev_energy_to_full_charge
                name: To 100%
              - entity: sensor.sim_ev_range
                name: Range
              - entity: sensor.sim_ev_odometer
                name: Odometer
          - type: glance
            columns: 2
            entities:
              - entity: sensor.sim_ev_exterior_temperature
                name: Outside
              - entity: sensor.sim_ev_cabin_temperature
                name: Cabin

      - type: grid
        cards:
          - type: heading
            heading: Now
            icon: mdi:speedometer
          # Live trip when driving (distance > 0)…
          - type: conditional
            conditions:
              - condition: numeric_state
                entity: sensor.sim_ev_current_trip_distance
                above: 0
            card:
              type: glance
              title: 🟢 Trip in progress
              columns: 4
              entities:
                - entity: sensor.sim_ev_current_trip_distance
                  name: km
                - entity: sensor.sim_ev_current_trip_duration
                  name: min
                - entity: sensor.sim_ev_current_trip_energy
                  name: kWh
                - entity: sensor.sim_ev_current_trip_consumption
                  name: kWh/100
                - entity: sensor.sim_ev_current_trip_average_speed
                  name: km/h
                - entity: sensor.sim_ev_current_trip_max_power
                  name: kW max
                - entity: sensor.sim_ev_current_trip_battery_used
                  name: "% used"
                - entity: sensor.sim_ev_current_trip_avg_temperature
                  name: "°C"
          # …otherwise the last completed trip in the same slot.
          - type: conditional
            conditions:
              - condition: numeric_state
                entity: sensor.sim_ev_current_trip_distance
                below: 0.001
            card:
              type: vertical-stack
              cards:
                - type: markdown
                  content: |
                    ### Last trip
                    {%- set ended = state_attr('sensor.sim_ev_last_trip_distance', 'ended_at') %}
                    {%- if ended %}
                    _{{ as_timestamp(ended) | timestamp_custom('%d/%m %H:%M') }} — {{ state_attr('sensor.sim_ev_last_trip_distance', 'origin') or '?' }} → {{ state_attr('sensor.sim_ev_last_trip_distance', 'destination') or '?' }}_
                    {%- endif %}
                - type: glance
                  columns: 3
                  entities:
                    - entity: sensor.sim_ev_last_trip_distance
                      name: km
                    - entity: sensor.sim_ev_last_trip_duration
                      name: min
                    - entity: sensor.sim_ev_last_trip_energy
                      name: kWh
                    - entity: sensor.sim_ev_last_trip_consumption
                      name: kWh/100
                    - entity: sensor.sim_ev_last_trip_cost
                      name: cost
                    - entity: sensor.sim_ev_last_trip_score
                      name: score

          # Journey slot: current if in flight, otherwise last completed.
          - type: markdown
            content: |
              {%- set CUR = {'EUR':'€','USD':'$','GBP':'£'} %}
              {%- set s = states('sensor.sim_ev_current_journey') | int(0) %}
              {%- if s > 0 %}
              ### 🟢 Journey in progress
              - **{{ s }} {% if s == 1 %}stage{% else %}stages{% endif %}** so far
              - Distance: **{{ state_attr('sensor.sim_ev_current_journey', 'distance_km') | default('—', true) }} km**
              - Energy: **{{ state_attr('sensor.sim_ev_current_journey', 'energy_kwh') | default('—', true) }} kWh**
              - Cost: **{{ state_attr('sensor.sim_ev_current_journey', 'cost') | default('—', true) }} €**
              {%- if state_attr('sensor.sim_ev_current_journey', 'stage_active') %}
              - _Stage moving right now_
              {%- endif %}
              {%- else %}
              {%- set ls = states('sensor.sim_ev_last_journey') %}
              {%- if ls in ('unknown', 'unavailable', '0', 'None') %}
              ### Last journey
              _No completed journeys yet._
              {%- else %}
              ### Last journey
              {%- set ended = state_attr('sensor.sim_ev_last_journey', 'ended_at') %}
              {%- if ended %}
              _Ended {{ as_timestamp(ended) | timestamp_custom('%d/%m %H:%M') }}_
              {%- endif %}
              - **{{ ls }} stages**
              - Distance: **{{ state_attr('sensor.sim_ev_last_journey', 'distance_km') | default('—', true) }} km**
              - Energy: **{{ state_attr('sensor.sim_ev_last_journey', 'energy_kwh') | default('—', true) }} kWh**
              - Cost: **{{ state_attr('sensor.sim_ev_last_journey', 'cost') | default('—', true) }} €**
              {%- endif %}
              {%- endif %}

      - type: grid
        cards:
          - type: heading
            heading: Where
            icon: mdi:map-marker
          - type: map
            default_zoom: 11
            entities:
              - device_tracker.sim_ev_location

  # ===== VIEW 2: TRIPS (searchable list + records) =====
  # Needs the helpers in packages/trip-list-helpers.yaml.
  - title: Trips
    path: trips
    icon: mdi:map-search
    type: sections
    max_columns: 2
    sections:
      - type: grid
        cards:
          - type: heading
            heading: Records
            icon: mdi:trophy
          # All-time from sensor.sim_ev_trip_records if present (CONTRACT.md §2),
          # else computed over the recent window. Forward-compatible / non-breaking.
          - type: markdown
            content: |
              {%- set CUR = {'EUR':'€','USD':'$','GBP':'£'} %}
              {%- set rsrc = 'sensor.sim_ev_trip_records' %}
              {%- set best = state_attr(rsrc, 'best_score') %}
              {%- if best is mapping %}
              {%- set longest = state_attr(rsrc, 'longest') %}
              {%- set efficient = state_attr(rsrc, 'most_efficient') %}
              {%- set cheapest = state_attr(rsrc, 'cheapest') %}
              ### 🏆 Records ({{ states(rsrc) }} trips all-time)
              | Record | When | Where | Value |
              |---|---|---|---:|
              {%- if best.value is defined %}
              | 🥇 Best score | {{ as_timestamp(best.ended_at) | timestamp_custom('%d/%m/%y') }} | {{ best.destination or '—' }} | **{{ best.value }}** |
              {%- endif %}
              {%- if longest %}
              | 📏 Longest | {{ as_timestamp(longest.ended_at) | timestamp_custom('%d/%m/%y') }} | {{ longest.destination or '—' }} | **{{ longest.value }} km** |
              {%- endif %}
              {%- if efficient %}
              | 🪫 Most efficient | {{ as_timestamp(efficient.ended_at) | timestamp_custom('%d/%m/%y') }} | {{ efficient.destination or '—' }} | **{{ efficient.value }} kWh/100** |
              {%- endif %}
              {%- if cheapest %}
              | 💶 Cheapest | {{ as_timestamp(cheapest.ended_at) | timestamp_custom('%d/%m/%y') }} | {{ cheapest.destination or '—' }} | **{{ cheapest.value }} {{ CUR.get(cheapest.currency, cheapest.currency or '€') }}** |
              {%- endif %}
              {%- else %}
              {%- set trips = state_attr('sensor.sim_ev_recent_trips', 'trips') or [] %}
              {%- if trips | length == 0 %}
              ### 🏆 Trip records
              _No trips recorded yet._
              {%- else %}
              {%- set scored = trips | rejectattr('score', 'none') | list %}
              {%- set with_dist = trips | rejectattr('distance_km', 'none') | list %}
              {%- set with_eff = trips | rejectattr('consumption_kwh_100km', 'none') | list %}
              {%- set with_cost = trips | rejectattr('cost', 'none') | list %}
              {%- set b = (scored | sort(attribute='score', reverse=true) | first) if scored else none %}
              {%- set lo = (with_dist | sort(attribute='distance_km', reverse=true) | first) if with_dist else none %}
              {%- set ef = (with_eff | sort(attribute='consumption_kwh_100km') | first) if with_eff else none %}
              {%- set ch = (with_cost | sort(attribute='cost') | first) if with_cost else none %}
              ### 🏆 Trip records (last {{ trips | length }} trips)
              | Record | When | Where | Value |
              |---|---|---|---:|
              {%- if b %}
              | 🥇 Best score | {{ as_timestamp(b.ended_at) | timestamp_custom('%d/%m') }} | {{ b.destination or '—' }} | **{{ b.score }}** |
              {%- endif %}
              {%- if lo %}
              | 📏 Longest | {{ as_timestamp(lo.ended_at) | timestamp_custom('%d/%m') }} | {{ lo.destination or '—' }} | **{{ lo.distance_km }} km** |
              {%- endif %}
              {%- if ef %}
              | 🪫 Most efficient | {{ as_timestamp(ef.ended_at) | timestamp_custom('%d/%m') }} | {{ ef.destination or '—' }} | **{{ ef.consumption_kwh_100km }} kWh/100** |
              {%- endif %}
              {%- if ch %}
              | 💶 Cheapest | {{ as_timestamp(ch.ended_at) | timestamp_custom('%d/%m') }} | {{ ch.destination or '—' }} | **{{ ch.cost }} {{ CUR.get(ch.currency, ch.currency or '€') }}** |
              {%- endif %}
              {%- endif %}
              {%- endif %}

      - type: grid
        cards:
          - type: heading
            heading: Search & filter
            icon: mdi:filter-variant
          - type: entities
            show_header_toggle: false
            entities:
              - entity: input_text.sim_ev_trip_search
                name: Search (destination / date)
              - entity: input_select.sim_ev_trip_sort
                name: Sort by
              - entity: input_select.sim_ev_trip_window
                name: Period
              - type: divider
              - entity: input_number.sim_ev_trip_min_distance
                name: Min distance (km)
              - entity: input_number.sim_ev_trip_min_score
                name: Min score
              - entity: input_number.sim_ev_trip_max_cost
                name: Max cost
              - entity: input_number.sim_ev_trip_max_consumption
                name: Max kWh/100
          - type: markdown
            content: |
              {%- set CUR = {'EUR':'€','USD':'$','GBP':'£'} %}
              {%- set raw = states('input_text.sim_ev_trip_search') %}
              {%- set q = '' if raw in ['unknown', 'unavailable', 'None'] else raw | lower | trim %}
              {%- set sort = states('input_select.sim_ev_trip_sort') %}
              {%- set win = states('input_select.sim_ev_trip_window') %}
              {%- set minD = states('input_number.sim_ev_trip_min_distance') | float(0) %}
              {%- set minS = states('input_number.sim_ev_trip_min_score') | float(0) %}
              {%- set maxC = states('input_number.sim_ev_trip_max_cost') | float(1000000) %}
              {%- set maxE = states('input_number.sim_ev_trip_max_consumption') | float(1000000) %}
              {%- set trips = state_attr('sensor.sim_ev_recent_trips', 'trips') or [] %}
              {%- set ns = namespace(rows=[]) %}
              {%- for t in trips %}
                {%- set ts = as_timestamp(t.ended_at, 0) %}
                {%- set label = ((t.origin or '') ~ ' ' ~ (t.destination or '') ~ ' ' ~ (ts | timestamp_custom('%d/%m/%Y %H:%M', true) if ts else '')) | lower %}
                {%- set okq = (q == '' or q in label) %}
                {%- set okd = (t.distance_km is none) or (t.distance_km | float(0) >= minD) %}
                {%- set oks = (t.score is none) or (t.score | float(0) >= minS) %}
                {%- set okc = (t.cost is none) or (t.cost | float(0) <= maxC) %}
                {%- set oke = (t.consumption_kwh_100km is none) or (t.consumption_kwh_100km | float(0) <= maxE) %}
                {%- set okw = true %}
                {%- if ts and win == 'Today' %}{% set okw = ts >= today_at('00:00').timestamp() %}
                {%- elif ts and win == 'This week' %}{% set okw = ts >= (today_at('00:00').timestamp() - (now().weekday() * 86400)) %}
                {%- elif ts and win == 'This month' %}{% set okw = (t.ended_at[:7] == now().strftime('%Y-%m')) %}
                {%- endif %}
                {%- if okq and okd and oks and okc and oke and okw %}{% set ns.rows = ns.rows + [t] %}{%- endif %}
              {%- endfor %}
              {%- if sort == 'Oldest' %}{% set ns.rows = ns.rows | sort(attribute='ended_at') | list %}
              {%- elif sort == 'Longest' %}{% set ns.rows = ns.rows | rejectattr('distance_km', 'none') | sort(attribute='distance_km', reverse=true) | list %}
              {%- elif sort == 'Shortest' %}{% set ns.rows = ns.rows | rejectattr('distance_km', 'none') | sort(attribute='distance_km') | list %}
              {%- elif sort == 'Best score' %}{% set ns.rows = ns.rows | rejectattr('score', 'none') | sort(attribute='score', reverse=true) | list %}
              {%- elif sort == 'Worst score' %}{% set ns.rows = ns.rows | rejectattr('score', 'none') | sort(attribute='score') | list %}
              {%- elif sort == 'Most efficient' %}{% set ns.rows = ns.rows | rejectattr('consumption_kwh_100km', 'none') | sort(attribute='consumption_kwh_100km') | list %}
              {%- elif sort == 'Least efficient' %}{% set ns.rows = ns.rows | rejectattr('consumption_kwh_100km', 'none') | sort(attribute='consumption_kwh_100km', reverse=true) | list %}
              {%- elif sort == 'Cheapest' %}{% set ns.rows = ns.rows | rejectattr('cost', 'none') | sort(attribute='cost') | list %}
              {%- elif sort == 'Priciest' %}{% set ns.rows = ns.rows | rejectattr('cost', 'none') | sort(attribute='cost', reverse=true) | list %}
              {%- else %}{% set ns.rows = ns.rows | sort(attribute='ended_at', reverse=true) | list %}
              {%- endif %}
              ### Showing {{ ns.rows | length }} of {{ trips | length }} trips
              {%- if ns.rows | length == 0 %}

              _No trips match the current filters._
              {%- else %}
              | Date | Route | km | kWh/100 | Cost | Rating |
              |---|---|---:|---:|---:|:--|
              {%- for t in ns.rows %}
              {%- set sc = t.score | float(0) %}
              {%- set full = [(sc / 2) | round(0, 'floor') | int, 5] | min %}
              {%- set stars = '★' * full + '☆' * (5 - full) %}
              | {{ as_timestamp(t.ended_at) | timestamp_custom('%d/%m %H:%M') }} | {{ t.origin or '—' }} → {{ t.destination or '—' }}{% if t.journey_id %} ·#{{ t.journey_id }}{% endif %} | {{ t.distance_km }} | {{ t.consumption_kwh_100km if t.consumption_kwh_100km is not none else '—' }} | {{ t.cost if t.cost is not none else '—' }} {{ CUR.get(t.currency, t.currency or '') }} | {% if t.score is not none %}{{ stars }} {{ '%.1f' | format(sc) }}{% else %}—{% endif %} |
              {%- endfor %}
              {%- endif %}

  # ===== VIEW 3: HISTORY (journeys + charges) =====
  - title: History
    path: history
    icon: mdi:format-list-bulleted
    type: sections
    max_columns: 2
    sections:
      - type: grid
        cards:
          - type: heading
            heading: Journeys
            icon: mdi:road-variant
          - type: markdown
            content: |
              {%- set CUR = {'EUR':'€','USD':'$','GBP':'£'} %}
              {%- set journeys = state_attr('sensor.sim_ev_recent_journeys', 'journeys') or [] %}
              {%- if journeys | length == 0 %}
              _No completed journeys yet._
              {%- else %}
              {%- for j in journeys %}
              {%- set ended = j.ended_at %}
              **{{ as_timestamp(ended) | timestamp_custom('%d/%m %H:%M') if ended else '—' }}** — journey #{{ j.journey_id }}
              {{ j.stages | default('?', true) }} {% if j.stages == 1 %}stage{% else %}stages{% endif %} · {{ j.distance_km | default('—', true) }} km · {{ j.energy_kwh | default('—', true) }} kWh · {{ j.cost | default('—', true) }} {{ CUR.get(j.currency, j.currency or '€') }}
              {%- endfor %}
              {%- endif %}

      - type: grid
        cards:
          - type: heading
            heading: Charges
            icon: mdi:ev-station
          - type: markdown
            content: |
              {%- set CUR = {'EUR':'€','USD':'$','GBP':'£'} %}
              {%- set charges = state_attr('sensor.sim_ev_recent_charges', 'charges') or [] %}
              {%- if charges | length == 0 %}
              _No charges recorded yet._
              {%- else %}
              {%- for c in charges %}
              {%- set ended = c.ended_at %}
              **{{ as_timestamp(ended) | timestamp_custom('%d/%m %H:%M') if ended else '—' }}** — {{ c.location or '—' }}
              {{ c.kwh | default('—', true) }} kWh × {{ c.price_per_kwh | default('—', true) }} {{ CUR.get(c.currency, c.currency or '€') }}/kWh = **{{ c.total_cost | default('—', true) }} {{ CUR.get(c.currency, c.currency or '€') }}**
              {%- endfor %}
              {%- endif %}

  # ===== VIEW 4: CHARTS =====
  - title: Charts
    path: charts
    icon: mdi:chart-line
    type: sections
    max_columns: 2
    sections:
      - type: grid
        cards:
          - type: heading
            heading: Monthly totals
            icon: mdi:chart-bar
          # total_increasing / total sensors -> use the LTS 'sum' per month.
          - type: statistics-graph
            title: Distance per month
            entities:
              - sensor.sim_ev_distance_this_month
            chart_type: bar
            period: month
            stat_types:
              - sum
            days_to_show: 365
          - type: statistics-graph
            title: Energy consumed per month
            entities:
              - sensor.sim_ev_energy_this_month
            chart_type: bar
            period: month
            stat_types:
              - sum
            days_to_show: 365
          - type: statistics-graph
            title: Charging cost per month
            entities:
              - sensor.sim_ev_spent_on_charging_this_month
            chart_type: bar
            period: month
            stat_types:
              - sum
            days_to_show: 365

      - type: grid
        cards:
          - type: heading
            heading: Trends
            icon: mdi:chart-line
          - type: statistics-graph
            title: Avg consumption (kWh/100km, 30-day rolling)
            entities:
              - sensor.sim_ev_avg_consumption_30_days
            chart_type: line
            period: day
            stat_types:
              - mean
            days_to_show: 60
          # avg_charge_price has no state_class -> not LTS-eligible; plot raw state history.
          - type: history-graph
            title: Avg charge price (€/kWh)
            hours_to_show: 720
            entities:
              - entity: sensor.sim_ev_avg_charge_price_30_days
                name: €/kWh
          - type: history-graph
            title: Battery (24h)
            hours_to_show: 24
            entities:
              - entity: sensor.sim_ev_battery_percent
                name: SoC %
          - type: logbook
            title: Recent activity (7d)
            hours_to_show: 168
            entities:
              - sensor.sim_ev_last_trip_distance
              - sensor.sim_ev_last_charge_energy

  # ===== VIEW 5: STATS =====
  - title: Stats
    path: stats
    icon: mdi:chart-box
    type: sections
    max_columns: 2
    sections:
      - type: grid
        cards:
          - type: heading
            heading: Driving
            icon: mdi:steering
          - type: entities
            entities:
              - sensor.sim_ev_distance_today
              - sensor.sim_ev_distance_this_week
              - sensor.sim_ev_distance_this_month
              - sensor.sim_ev_distance_this_year
              - type: divider
              - sensor.sim_ev_energy_this_month
              - sensor.sim_ev_cost_this_month
              - sensor.sim_ev_trips_this_month
              - type: divider
              - sensor.sim_ev_avg_consumption_30_days

      - type: grid
        cards:
          - type: heading
            heading: Charging
            icon: mdi:ev-station
          - type: entities
            entities:
              - sensor.sim_ev_charges_this_month
              - sensor.sim_ev_energy_charged_this_month
              - sensor.sim_ev_spent_on_charging_this_month
              - type: divider
              - sensor.sim_ev_avg_charge_price_30_days
              - sensor.sim_ev_charge_in_progress
          # Live charge session — only while plugged in (vehicle integration).
          - type: conditional
            conditions:
              - condition: state
                entity: sensor.sim_ev_charge_session_phase
                state_not: unplugged
            card:
              type: entities
              title: Charge session
              entities:
                - sensor.sim_ev_charge_session_phase
                - sensor.sim_ev_charge_session_duration
                - sensor.sim_ev_charge_session_kwh_added
                - sensor.sim_ev_charge_session_soc_added
