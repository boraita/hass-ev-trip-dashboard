# EV Trip Dashboard v2 — 9-view BYD-inspired layout.
#
# Views (matching the BYD mobile app pantallas):
#   1. Resumen      — vehicle hero + tire pressures + map + live charge popup
#   2. Calendario   — monthly activity calendar with trip/charge badges
#   3. Tendencias   — KPI tiles + dual-axis monthly bars + 60-day line
#   4. Patrones     — by-hour bar + by-weekday radar + weekday km strip
#   5. Eficiencia   — monthly consumption line + scatter + temp buckets
#   6. Récords      — top-9 lists per criterion + KPI tiles
#   7. Detalle      — single-trip drilldown with KPIs + percentile + map
#   8. Viajes       — trip list with 30d averages header
#   9. Cargas       — charge list with 4 KPI tiles + add (+) button
#
# Placeholders:
#   sealion_7   the trip-LOGGER slug (e.g. sealion_7) — trip / charge / journey / stats sensors
#   byd_sealion_7  the CAR integration slug (e.g. byd_sealion_7) — range / odometer / map / tires
#
# Required HACS frontends:
#   - custom:mushroom-template-card, custom:mushroom-title-card, custom:mushroom-chips-card
#   - custom:button-card
#   - custom:apexcharts-card
#   - custom:mini-graph-card
#   - custom:calendar-card-pro
#   - optional: custom:atomic-calendar-revive (fallback), custom:browser_mod (calendar popups)

title: EV Trip
views:

  # ============================================================
  # VIEW 1 — Resumen del vehículo
  # ============================================================
  - title: Resumen
    path: resumen
    icon: mdi:car-electric
    type: sections
    max_columns: 2
    sections:
      - type: grid
        cards:
          !include ../cards/resumen-vehicle.yaml

  # ============================================================
  # VIEW 2 — Calendario
  # ============================================================
  - title: Calendario
    path: calendar
    icon: mdi:calendar
    type: sections
    max_columns: 2
    sections:
      - type: grid
        cards:
          !include ../cards/calendar.yaml

  # ============================================================
  # VIEW 3 — Tendencias
  # ============================================================
  - title: Tendencias
    path: trends
    icon: mdi:chart-line
    type: sections
    max_columns: 2
    sections:
      - type: grid
        cards:
          !include ../cards/trends.yaml

  # ============================================================
  # VIEW 4 — Patrones
  # ============================================================
  - title: Patrones
    path: patterns
    icon: mdi:chart-bell-curve-cumulative
    type: sections
    max_columns: 2
    sections:
      - type: grid
        cards:
          !include ../cards/patterns.yaml

  # ============================================================
  # VIEW 5 — Eficiencia
  # ============================================================
  - title: Eficiencia
    path: efficiency
    icon: mdi:leaf
    type: sections
    max_columns: 2
    sections:
      - type: grid
        cards:
          !include ../cards/efficiency-charts.yaml

  # ============================================================
  # VIEW 6 — Récords
  # ============================================================
  - title: Récords
    path: tops
    icon: mdi:trophy
    type: sections
    max_columns: 2
    sections:
      - type: grid
        cards:
          !include ../cards/tops-rankings.yaml

  # ============================================================
  # VIEW 7 — Detalle del último viaje
  # ============================================================
  - title: Detalle
    path: trip-detail
    icon: mdi:magnify
    type: sections
    max_columns: 2
    sections:
      - type: grid
        cards:
          !include ../cards/trip-detail.yaml

  # ============================================================
  # VIEW 8 — Viajes (lista)
  # ============================================================
  - title: Viajes
    path: trips
    icon: mdi:car-multiple
    type: sections
    max_columns: 2
    sections:
      - type: grid
        cards:
          !include ../cards/trip-list-v2.yaml

  # ============================================================
  # VIEW 9 — Cargas (lista)
  # ============================================================
  - title: Cargas
    path: charges
    icon: mdi:ev-station
    type: sections
    max_columns: 2
    sections:
      - type: grid
        cards:
          !include ../cards/charges-v2.yaml
